<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSVTU Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6; /* Soft Purple */
            --secondary: #ec4899; /* Pink Glow */
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --dim: rgba(255,255,255,0.6);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            padding: 20px;
        }

        /* Ambient Glow Blobs */
        .glow-1 {
            position: fixed; top: -10%; left: -10%; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, transparent 70%);
            filter: blur(50px); z-index: -1;
        }
        .glow-2 {
            position: fixed; bottom: -10%; right: -10%; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.15) 0%, transparent 70%);
            filter: blur(50px); z-index: -1;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 35px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header h1 { font-weight: 800; font-size: 26px; margin-bottom: 25px; text-align: center; letter-spacing: -0.5px; }

        .input-group { margin-bottom: 20px; }
        .label { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.6); margin-bottom: 8px; display: block; }

        input, select {
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--glass-border);
            padding: 12px 16px;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            transition: 0.2s;
        }

        input:focus { border-color: var(--primary); outline: none; background: rgba(255,255,255,0.12); }

        /* Toggle Mode Switch */
        .mode-switch {
            display: flex; background: rgba(0,0,0,0.2); border-radius: 12px; padding: 4px; margin-bottom: 25px;
        }
        .mode-switch input { display: none; }
        .mode-switch label {
            flex: 1; text-align: center; padding: 8px; cursor: pointer; border-radius: 9px;
            font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.5);
        }
        .mode-switch input:checked + label { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(139, 92, 246, 0.3); }

        /* Button Grid */
        .grid-options { display: flex; gap: 10px; margin-bottom: 25px; }
        .check-btn { flex: 1; }
        .check-btn input { display: none; }
        .check-btn label {
            display: block; padding: 10px; text-align: center; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); border-radius: 10px; cursor: pointer;
            font-size: 13px; font-weight: 600; transition: 0.3s;
        }
        .check-btn input:checked + label { border-color: var(--secondary); background: rgba(236, 72, 153, 0.1); color: var(--secondary); }

        .btn-action {
            width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 700;
            cursor: pointer; transition: 0.3s; margin-bottom: 10px; font-size: 15px;
        }
        .btn-view { background: linear-gradient(90deg, var(--primary), #a855f7); color: white; }
        .btn-view:hover { filter: brightness(1.1); transform: translateY(-1px); }
        
        .btn-admit { background: rgba(255,255,255,0.08); color: white; border: 1px solid var(--glass-border); }
        .btn-admit:hover { background: rgba(255,255,255,0.12); }

        .detained-box { font-size: 12px; color: #fda4af; display: flex; align-items: center; gap: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="card">
    <div class="header">
        <h1 style="background: linear-gradient(to right, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Swift Search</h1>
        <div id="motto" style="font-size: 11px; color: var(--dim); text-align: center; margin-bottom: 15px; font-style: italic;">
    "Loading your destiny... please hold your breath."
</div>

    </div>

    <form>
        <div class="mode-switch">
            <input type="radio" name="m" id="Regular" checked onclick="toggle(false)">
            <label for="Regular">Regular</label>
            <input type="radio" name="m" id="Backlog" onclick="toggle(true)">
            <label for="Backlog">Backlog</label>
        </div>

        <div class="input-group">
            <label class="label">Roll Number</label>
            <input type="text" inputmode="numeric" id="rollNo" placeholder="Enter Roll No">
        </div>

        <div class="input-group">
            <label class="label">Semester</label>
            <select id="mySem"></select>
        </div>

        <div class="detained-box" id="dBox">
            <input type="checkbox" id="isDetained">
            <label for="isDetained">Apply 1 Year Detained Offset</label>
        </div>

        <div id="bFields" style="display: none; margin-bottom: 20px;">
            <label class="label">Session & Year</label>
            <select id="months" style="margin-bottom:8px;">
                <option value="APR-MAY">APR-MAY</option>
                <option value="NOV-DEC">NOV-DEC</option>
            </select>
            <input type="number" id="yearBack" placeholder="Year (e.g. 2025)">
        </div>

        <label class="label">Exam Type</label>
        <div class="grid-options">
            <div class="check-btn">
                <input type="checkbox" id="RTRV" onclick="one(this)">
                <label for="RTRV">RTRV</label>
            </div>
            <div class="check-btn">
                <input type="checkbox" id="RRV" onclick="one(this)">
                <label for="RRV">RRV</label>
            </div>
        </div>

        <button type="button" class="btn-action btn-view" onclick="result_search()">Get Result</button>
        <button type="button" class="btn-action btn-admit" onclick="admit_search()">Admit Card</button>
    </form>
</div>

<script>
    const s = document.getElementById('mySem');
    for(let i=1; i<=8; i++) s.innerHTML += `<option value="${i}">Semester ${i}</option>`;

    function toggle(b) {

    document.getElementById('bFields').style.display = b ? 'block' : 'none';
    document.getElementById('dBox').style.display = b ? 'none' : 'flex';

    document.getElementById('RTRV').checked = false;
    document.getElementById('RRV').checked = false;

    if(!b){
        document.getElementById('yearBack').value="";
    }
}


// Keep your existing 'one' function for the checkboxes
function one(c) {
    const isRTRV = document.getElementById('RTRV');
    const isRRV = document.getElementById('RRV');
    
    // If clicking one, uncheck the other
    if (c.id === 'RTRV') isRRV.checked = false;
    if (c.id === 'RRV') isRTRV.checked = false;
}


    // function one(c) {
    //     document.getElementById('RTRV').checked = false;
    //     document.getElementById('RRV').checked = false;
    //     c.checked = true;
    // }
    
    const lines = [
    "One sheet of paper can't decide my future, but this PDF might.",
    "Checking if the examiner was in a good mood today...",
    "Engineering: Where 'Pass' is the new 'Topper'.",
    "May the 'Grace Marks' be with you.",
    "Don't worry, even Einstein had backlogs (probably).",
    "Processing your results... Stay hydrated.",
    "Remember, your CGPA is just a number. A very scary number.",
    "Searching for your marks in the CSVTU abyss...",
    "Whatever happens, the Chai at the canteen still tastes the same."
];

// Pick one randomly on load
window.onload = () => {
    document.getElementById('motto').innerText =
        lines[Math.floor(Math.random() * lines.length)];
}

</script>
<script src="js/RAscript.js"></script>
</body>
</html>
